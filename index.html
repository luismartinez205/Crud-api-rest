<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My appShop</title>
    <link rel="stylesheet" href="aircss.css">
    <link rel="stylesheet" href="custom.css">
</head>

<body>
    <section class="bg-light">
        <div class="container py-5">
            <div class="row text-center py-3">
                <div class="col-lg-6 m-auto">
                    <h1 class="h1 text-orange">Productos Destacados</h1>
                    <p class="m-bottom"> Recuerde que puede encontrar una amplia variedad de productos en nuestra tienda, desde alimentos
                        para mascotas hasta accesorios y medicamentos veterinarios. ¡Explore nuestro catálogo y
                        encuentre todo lo que necesita para cuidar a sus mascotas!
                    </p>
                </div>
            </div>
            <card-featured></card-featured>                                   
        </div>
    </section>
    <!-- Inicio de modal-->
    <div class="modal">
        <div class="modal-content">
            <button class="close">X</button>
            <div class="card">
                <img src="471432-800-auto.webp" alt="">
            </div>
            <div class="controls">
                <button id="zoomIn">+</button>
                <button id="zoomOut">-</button>
            </div>
        </div>
        <!--Fin del modal-->
    </div>    
    <script type="module" src="./main.js"></script>
    <script type="module" src="./custom.js"></script>
</body>

</html>
